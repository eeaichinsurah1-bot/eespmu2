<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mobile-Ready Managed Web Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* Mobile Friendly Overlay */
        .map-overlay {
            position: absolute; 
            top: 10px; 
            left: 10px; 
            width: 85%; /* Responsive width */
            max-width: 300px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95); 
            padding: 10px; 
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Adjust Draw tools for mobile so they don't overlap UI */
        .leaflet-draw { margin-top: 180px !important; }

        .search-box { display: flex; gap: 4px; margin-top: 8px; }
        input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { cursor: pointer; padding: 8px; background: #007bff; color: white; border: none; border-radius: 4px; }
        
        #status-text { font-size: 11px; margin-top: 8px; color: #444; }
        
        #coords-info {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            z-index: 2000;
            font-size: 10px;
            padding: 5px;
            text-align: center;
        }

        /* QGIS Style Label */
        .qgis-label {
            background: white; border: 1px solid #777; padding: 2px 5px;
            font-size: 10px; font-weight: bold; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="coords-info">Touch map for Lat/Lon & Elevation</div>
<div id="map"></div>

<div class="map-overlay" id="ui-panel">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <b style="font-size: 13px;">WBADMIP Map</b>
        <button onclick="toggleUI()" style="padding: 2px 5px; background: #666;">hide</button>
    </div>
    <div id="ui-content">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search Mouza/Block...">
            <button onclick="performSearch()">Find</button>
        </div>
        <div id="status-text">Select layers from the right menu</div>
        <div id="search-nav" style="display:none; justify-content: space-between; margin-top: 5px;">
            <button onclick="cycleResults(-1)">←</button>
            <button onclick="cycleResults(1)">→</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    const geojsonConfig = [
        { url: 'dg3.geojson', name: 'Mouza Boundary', color: '#3388ff' },
        { url: '2ALLWRIDD.geojson', name: 'WRIDD + WBADMIP I', color: '#55m8ff' },
        { url: 'WBADMIPII.geojson', name: 'WBADMIP PH-II', color: '#55m8ff' },
        { url: 'dg4.geojson', name: 'Proposed Scheme', color: '#66ad5c' }
    ];

    // 1. Initialize Map (Only OSM)
    const map = L.map('map', { 
        preferCanvas: true,
        tap: false // Helps with mobile clicks
    }).setView([23.0, 87.0], 8);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
        attribution: '© OSM' 
    }).addTo(map);

    let allLayers = [];
    let searchResults = [];
    let currentIndex = -1;
    let lastHighlighted = null;
    const overlayMaps = {};

    // 2. Right-Click (Context Menu) for Soaratlas
    map.on('contextmenu', (e) => {
        const { lat, lng } = e.latlng;
        const url = `https://soaratlas.com/maps?basemap=Google+Satellite&pos=${lat.toFixed(6)}%2C${lng.toFixed(6)}%2C17.86`;
        
        const container = L.DomUtil.create('div');
        container.innerHTML = `<button onclick="window.open('${url}', '_blank')" style="padding:8px; cursor:pointer;">Open Satellite View (Soaratlas)</button>`;
        
        L.popup()
            .setLatLng(e.latlng)
            .setContent(container)
            .openOn(map);
    });

    // 3. Drawing Tools
    const drawnItems = new L.FeatureGroup().addTo(map);
    new L.Control.Draw({
        edit: { featureGroup: drawnItems },
        draw: { circle: false, rectangle: false, marker: false, circlemarker: false }
    }).addTo(map);

    // 4. Load GeoJSON (But don't add to map initially)
    async function loadGeoJSON(config, group) {
        try {
            const response = await fetch(config.url);
            const data = await response.json();
            
            L.geoJSON(data, {
                pointToLayer: (f, ll) => L.circleMarker(ll, { radius: 6, fillColor: "#00ffff", color: "#fff", weight: 2, fillOpacity: 1 }),
                onEachFeature: (feature, layer) => {
                    allLayers.push({ layer, group, configName: config.name });
                    const p = feature.properties;
                    layer.bindTooltip(`<b>Block:</b> ${p.BLOCK || ''}<br><b>Mouza:</b> ${p.MOUZA || ''}`, { sticky: true, className: 'qgis-label' });
                    
                    let pop = `<div style="max-height:120px; overflow-y:auto; font-size:11px;"><b>Details:</b><br>`;
                    for (let k in p) pop += `<b>${k}:</b> ${p[k]}<br>`;
                    layer.bindPopup(pop + "</div>");
                }
            }).addTo(group);
        } catch (err) { console.error("Error:", config.name); }
    }

    // 5. Build Layer Control (Default OFF)
    geojsonConfig.forEach(config => {
        const group = L.layerGroup(); // NOT adding to map here
        overlayMaps[config.name] = group;
        loadGeoJSON(config, group);
    });
    L.control.layers(null, overlayMaps, { collapsed: true }).addTo(map);

    // 6. Search & Utilities
    function performSearch() {
        const query = document.getElementById('search-input').value.trim().toLowerCase();
        searchResults = allLayers.filter(obj => 
            obj.configName === 'Mouza Boundary' && 
            Object.values(obj.layer.feature.properties).some(v => v && v.toString().toLowerCase().includes(query))
        );

        if (searchResults.length > 0) {
            document.getElementById('search-nav').style.display = 'flex';
            cycleResults(1);
        } else {
            alert("No results in Mouza Boundary layer.");
        }
    }

    function cycleResults(direction) {
        if (lastHighlighted) lastHighlighted.setStyle({ color: lastHighlighted.options.originalColor, weight: 2 });
        currentIndex = (currentIndex + direction + searchResults.length) % searchResults.length;
        const target = searchResults[currentIndex];
        
        if (!map.hasLayer(target.group)) map.addLayer(target.group);
        
        target.layer.options.originalColor = target.layer.options.color;
        target.layer.setStyle({ color: 'yellow', weight: 5 });
        map.fitBounds(target.layer.getBounds());
        target.layer.openPopup();
        lastHighlighted = target.layer;
        document.getElementById('status-text').innerText = `Result ${currentIndex+1}/${searchResults.length}`;
    }

    // UI Toggle for Mobile
    function toggleUI() {
        const content = document.getElementById('ui-content');
        content.style.display = content.style.display === 'none' ? 'block' : 'none';
    }

    // Elevation & Coords
    map.on('mousemove click', async (e) => {
        const lat = e.latlng.lat.toFixed(5);
        const lng = e.latlng.lng.toFixed(5);
        document.getElementById('coords-info').innerHTML = `Lat: ${lat} | Lon: ${lng} | Loading Elev...`;
        try {
            const res = await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${lat},${lng}`);
            const data = await res.json();
            document.getElementById('coords-info').innerHTML = `Lat: ${lat} | Lon: ${lng} | Elev: ${data.results[0].elevation}m`;
        } catch {
            document.getElementById('coords-info').innerHTML = `Lat: ${lat} | Lon: ${lng}`;
        }
    });
</script>
</body>
</html>
